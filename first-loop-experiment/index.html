<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b13">
  <title>First Loop Experiment · Vibe Coder Simulator</title>
  <meta name="description" content="A concise, deterministic experiment for the Vibe Coder Simulator product-building loop.">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <a class="exit-link" id="exit-link" href="../mvp-deck.html#play" aria-label="Exit experiment">× <span>Exit</span></a>

  <main class="experiment-shell">
    <header class="experiment-header">
      <div class="brand">
        <span class="brand-mark">VCS</span>
        <div><strong>First Loop</strong><small>public experiment · not canon</small></div>
      </div>
      <div class="run-status" aria-label="Run status">
        <span id="status-day">DAY 7</span>
        <strong id="status-time">09:00</strong>
        <span id="status-cash">$560</span>
        <span id="status-credits">620⚡</span>
        <span id="status-focus">4/5 Focus</span>
      </div>
    </header>

    <nav class="progress" id="progress" aria-label="Experiment progress"></nav>

    <section class="stage" id="stage">
      <div class="scene-art" id="scene-art" aria-hidden="true"></div>
      <img class="portrait" id="portrait" alt="" hidden>
      <div class="stage-vignette" aria-hidden="true"></div>
      <article class="decision-panel" id="decision-panel" aria-live="polite"></article>
    </section>

    <footer class="experiment-footer">
      <span id="screen-metric">Tap 0 · 0 words</span>
      <span>Deterministic · local run log</span>
      <details class="lab-tools">
        <summary>Lab tools</summary>
        <div>
          <button type="button" id="copy-run">Copy run</button>
          <button type="button" id="restart-run">Restart</button>
        </div>
      </details>
    </footer>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="experiment.js?v=2"></script>
</body>
</html>
