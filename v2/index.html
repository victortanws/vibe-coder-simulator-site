<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vibe Coder Simulator — V2 Approval Preview</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0d1018}
  #campaign{display:block;width:100%;height:100%;border:0;opacity:0;transition:opacity .18s ease}
  #campaign.ready{opacity:1}
  noscript{display:block;padding:24px;color:#f5f0e6;font:16px/1.5 system-ui,sans-serif}
</style>
</head>
<body>
<iframe id="campaign" src="../index.html#play" title="Vibe Coder Simulator public-site V2 approval preview"></iframe>
<noscript>This approval preview requires JavaScript.</noscript>
<script>
  const campaign=document.getElementById('campaign');
  let gameFrame=null;
  let gameModalOpen=false;
  function updateExitControl(){
    const button=campaign.contentDocument?.getElementById('demo-close');
    const label=button?.querySelector('span:last-child');
    if(label)label.textContent=gameModalOpen?'Close menu':'Exit game';
    if(button)button.setAttribute('aria-label',gameModalOpen?'Close the open game menu':'Close the expanded game');
  }
  window.addEventListener('message',event=>{
    if(event.data?.type!=='vcs-modal-state')return;
    gameModalOpen=Boolean(event.data.open);
    updateExitControl();
  });
  campaign.addEventListener('load',()=>{
    const game=campaign.contentDocument&&campaign.contentDocument.querySelector('.demo-frame iframe');
    if(!game){
      document.querySelector('noscript').textContent='The campaign page loaded, but its prototype frame was not found.';
      campaign.classList.add('ready');
      return;
    }
    gameFrame=game;
    game.src='v2/playable-prototype-v5.html';
    const exit=campaign.contentDocument.getElementById('demo-close');
    exit?.addEventListener('click',event=>{
      if(!gameModalOpen)return;
      event.preventDefault();
      event.stopImmediatePropagation();
      gameFrame?.contentWindow?.VCSPrototype?.closeModal();
      gameModalOpen=false;
      updateExitControl();
    },true);
    const note=campaign.contentDocument.querySelector('.demo-note p');
    if(note)note.textContent='Choose a station to open its action.';
    campaign.classList.add('ready');
  },{once:true});
</script>
</body>
</html>
